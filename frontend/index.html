<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Launch Intelligence Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #090e17; 
            --panel: rgba(15, 23, 42, 0.75); 
            --text: #f8fafc;
            --go: #10b981; 
            --nogo: #ef4444; 
            --accent: #38bdf8;
            --border: rgba(51, 65, 85, 0.5);
            --glass-blur: blur(16px);
        }
        body { 
            margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); 
            color: var(--text); display: flex; height: 100vh; overflow: hidden; 
        }
        #map { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        /* Glassmorphism Sidebar */
        #sidebar { 
            position: absolute; top: 20px; left: 20px; bottom: 20px; width: 420px; 
            background: var(--panel); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border); border-radius: 16px; 
            display: flex; flex-direction: column; z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateX(-120%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar.open { transform: translateX(0); }
        
        .header { padding: 25px; border-bottom: 1px solid var(--border); }
        .header h1 { margin: 0; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; font-weight: 800; letter-spacing: 1px; color: var(--accent); text-transform: uppercase; }
        .header p { font-size: 0.9rem; color: #94a3b8; margin: 8px 0 0 0; font-weight: 300; }
        
        #weather-panel { flex-grow: 1; overflow-y: auto; padding: 20px; }
        #weather-panel::-webkit-scrollbar { width: 6px; }
        #weather-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* Chart Container */
        .chart-container { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid var(--border); }
        
        .timeline-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 4px solid transparent; transition: transform 0.2s, background 0.2s; }
        .timeline-item:hover { transform: translateX(5px); background: rgba(255,255,255,0.06); }
        .timeline-item.go { border-left-color: var(--go); }
        .timeline-item.nogo { border-left-color: var(--nogo); opacity: 0.85; }
        
        .time-badge { display: flex; justify-content: space-between; font-weight: 600; font-size: 1rem; margin-bottom: 8px; }
        .status-badge { padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; letter-spacing: 0.5px; }
        .status-go { background: rgba(16, 185, 129, 0.2); color: var(--go); }
        .status-nogo { background: rgba(239, 68, 68, 0.2); color: var(--nogo); }
        
        .metrics { font-size: 0.85rem; color: #cbd5e1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-top: 10px; }
        .metric-item { display: flex; flex-direction: column; align-items: center; }
        .metric-val { font-weight: 600; color: #fff; margin-top: 2px; }
        
        .violations { color: #fca5a5; font-size: 0.8rem; margin-top: 10px; font-weight: 400; display: flex; align-items: center; gap: 5px; padding: 8px; background: rgba(239, 68, 68, 0.1); border-radius: 6px; }
        
        .loader { display: none; padding: 40px 20px; text-align: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(56, 189, 248, 0.2); border-radius: 50%; border-top-color: var(--accent); animation: spin 1s linear infinite; margin: 0 auto 15px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Floating Controls */
        #controls {
            position: absolute; top: 20px; right: 20px; background: var(--panel); backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border); border-radius: 12px; padding: 15px; z-index: 10;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; gap: 10px;
        }
        .control-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; font-weight: 600; margin-bottom: 5px; }
        .toggle-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s; font-family: 'Outfit', sans-serif; font-size: 0.85rem; }
        .toggle-btn.active { background: rgba(56, 189, 248, 0.2); border-color: var(--accent); color: var(--accent); }

        /* Pulsing Marker */
        .pulse-marker { width: 16px; height: 16px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 0 rgba(56, 189, 248, 0.6); animation: pulse 2s infinite; border: 2px solid #fff; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(56, 189, 248, 0); } 100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); } }
        
        .leaflet-tooltip { background: var(--panel); border: 1px solid var(--border); color: #fff; backdrop-filter: blur(8px); border-radius: 6px; font-family: 'Outfit', sans-serif; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        .leaflet-tooltip-top:before { border-top-color: var(--border); }
        
        /* Dropdown styling */
        .basemap-select { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-family: 'Outfit', sans-serif; font-size: 0.85rem; outline: none; cursor: pointer; margin-bottom: 15px; }
        .basemap-select option { background: var(--panel); color: var(--text); }
        
        /* Date Picker specific */
        input[type="date"].basemap-select::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="controls">
        <div class="control-label">Basemap</div>
        <select class="basemap-select" onchange="changeBasemap(this.value)">
            <option value="cartoDark" selected>Carto Dark Matter</option>
            <option value="esriSatellite">ESRI Satellite Image</option>
            <option value="cartoVoyager">Carto Voyager (Light)</option>
            <option value="osm">OpenStreetMap</option>
            <option value="opentopo">OpenTopoMap</option>
            <option value="esriOcean">ESRI World Ocean</option>
            <option value="stamenTerrain">Stamen Terrain</option>
        </select>

        <div class="control-label">Weather Overlays</div>
        <button class="toggle-btn active" onclick="toggleLayer('precip', this)">Precipitation (Radar)</button>
        <button class="toggle-btn" onclick="toggleLayer('clouds', this)">Cloud Cover</button>
    </div>

    <div id="sidebar" class="open">
        <div class="header">
            <h1>🛰️ LCC Intel</h1>
            <p>Awaiting Target Selection...</p>
            <div id="mission-date-container" style="display: none; margin-top: 15px;">
                <label for="missionDate" style="font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;">Mission Date</label>
                <input type="date" id="missionDate" class="basemap-select" style="margin-top: 5px; margin-bottom: 0;" onchange="filterAndRender()">
            </div>
        </div>
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <div style="color: var(--accent); font-size: 0.9rem; font-weight: 300;">Running LCC Evaluations...</div>
        </div>
        <div id="weather-panel"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([20, 0], 3);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        
        // Extensive Collection of Basemaps
        const basemaps = {
            cartoDark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }),
            esriSatellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '&copy; Esri' }),
            cartoVoyager: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }),
            osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }),
            opentopo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenTopoMap' }),
            esriOcean: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', { attribution: '&copy; Esri' }),
            stamenTerrain: L.tileLayer('https://tiles.stadiamaps.com/tiles/stamen_terrain/{z}/{x}/{y}{r}.jpg', { attribution: '&copy; Stadia Maps' })
        };

        let currentBasemap = basemaps.cartoDark;
        currentBasemap.addTo(map);

        // API Key for OWM overlays
        const owmKey = 'b1b15e88fa797225412429c1c50c122a1';
        
        const layers = {
            precip: L.tileLayer(`https://tile.openweathermap.org/map/precipitation_new/{z}/{x}/{y}.png?appid=${owmKey}`, { opacity: 0.75, zIndex: 100 }),
            clouds: L.tileLayer(`https://tile.openweathermap.org/map/clouds_new/{z}/{x}/{y}.png?appid=${owmKey}`, { opacity: 0.65, zIndex: 90 })
        };

        // Enable precip by default
        layers.precip.addTo(map);

        window.toggleLayer = function(type, btn) {
            if (map.hasLayer(layers[type])) {
                map.removeLayer(layers[type]);
                btn.classList.remove('active');
            } else {
                map.addLayer(layers[type]);
                btn.classList.add('active');
            }
        };

        window.changeBasemap = function(key) {
            map.removeLayer(currentBasemap);
            currentBasemap = basemaps[key];
            currentBasemap.addTo(map);
            
            // Ensure weather overlays always render on top of the new basemap
            if(map.hasLayer(layers.precip)) layers.precip.bringToFront();
            if(map.hasLayer(layers.clouds)) layers.clouds.bringToFront();
        };

        const sidebar = document.getElementById('sidebar');
        const weatherPanel = document.getElementById('weather-panel');
        const loader = document.getElementById('loader');
        const headerText = document.querySelector('.header p');
        const missionDateContainer = document.getElementById('mission-date-container');
        const missionDateInput = document.getElementById('missionDate');
        let chartInstance = null;
        let currentForecast = [];

        const pulseIcon = L.divIcon({ className: 'custom-div-icon', html: "<div class='pulse-marker'></div>", iconSize: [20, 20], iconAnchor: [10, 10] });

        fetch('/api/sites')
            .then(res => res.json())
            .then(sites => {
                const bounds = [];
                sites.forEach(site => {
                    bounds.push([site.lat, site.lon]);
                    const marker = L.marker([site.lat, site.lon], { icon: pulseIcon }).addTo(map);
                    marker.bindTooltip(`<b>${site.name}</b><br><span style="color:#94a3b8">${site.country}</span>`, { direction: 'top', offset: [0, -10] });
                    marker.on('click', () => {
                        map.flyTo([site.lat, site.lon], 7, { duration: 1.5 });
                        loadWeather(site.id, site.name, site.country);
                    });
                });
                if(bounds.length) map.fitBounds(bounds, { padding: [50, 50] });
            });

        function loadWeather(siteId, siteName, country) {
            weatherPanel.innerHTML = '';
            headerText.innerHTML = `${siteName} &middot; <span style="color:var(--accent)">${country}</span>`;
            loader.style.display = 'block';
            missionDateContainer.style.display = 'none';
            sidebar.classList.add('open');

            fetch(`/api/weather/${siteId}`)
                .then(res => res.json())
                .then(data => {
                    loader.style.display = 'none';
                    currentForecast = data.forecast;
                    
                    if (currentForecast.length > 0) {
                        missionDateContainer.style.display = 'block';
                        const firstDate = new Date(currentForecast[0].time).toISOString().split('T')[0];
                        const lastDate = new Date(currentForecast[currentForecast.length - 1].time).toISOString().split('T')[0];
                        
                        missionDateInput.min = firstDate;
                        missionDateInput.max = lastDate;
                        missionDateInput.value = firstDate;
                        
                        window.filterAndRender();
                    }
                })
                .catch(err => {
                    loader.style.display = 'none';
                    weatherPanel.innerHTML = `<div class="violations">Failed to load intel. Connection error.</div>`;
                });
        }
        
        window.filterAndRender = function() {
            const selectedDate = missionDateInput.value;
            if (!selectedDate) return;
            
            // Filter forecast for the selected date
            const displayData = currentForecast.filter(hour => hour.time.startsWith(selectedDate));
            
            if (displayData.length === 0) {
                weatherPanel.innerHTML = `<div class="violations" style="background: rgba(255,255,255,0.05); color: #cbd5e1;">No forecast data available for ${selectedDate}</div>`;
                return;
            }
            
            // Render Chart
            weatherPanel.innerHTML = '<div class="chart-container"><canvas id="weatherChart"></canvas></div><div id="timeline"></div>';
            renderChart(displayData);
            
            // Render Timeline
            let html = '';
            displayData.forEach(hour => {
                const isGo = hour.status === 'GO';
                const dateObj = new Date(hour.time);
                const day = dateObj.toLocaleDateString([], {weekday: 'short', month: 'short', day: 'numeric'});
                const time = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                html += `
                    <div class="timeline-item ${isGo ? 'go' : 'nogo'}">
                        <div class="time-badge">
                            <span>${time}</span>
                            <span class="status-badge ${isGo ? 'status-go' : 'status-nogo'}">${hour.status}</span>
                        </div>
                        <div class="metrics">
                            <div class="metric-item"><span style="font-size:12px">Temp</span><span class="metric-val">${hour.temp}°C</span></div>
                            <div class="metric-item"><span style="font-size:12px">Wind</span><span class="metric-val">${hour.wind} km/h</span></div>
                            <div class="metric-item"><span style="font-size:12px">CAPE</span><span class="metric-val">${hour.cape}</span></div>
                            <div class="metric-item"><span style="font-size:12px">Clouds</span><span class="metric-val">${hour.clouds}%</span></div>
                            <div class="metric-item"><span style="font-size:12px">Vis</span><span class="metric-val">${(hour.visibility/1000).toFixed(1)} km</span></div>
                        </div>
                        ${!isGo ? `<div class="violations">⚠️ ${hour.violations.join(' &bull; ')}</div>` : ''}
                    </div>
                `;
            });
            document.getElementById('timeline').innerHTML = html;
        };

        function renderChart(data) {
            const ctx = document.getElementById('weatherChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            
            const labels = data.map(d => new Date(d.time).getHours() + ':00');
            const winds = data.map(d => d.wind);
            const capes = data.map(d => d.cape);
            const clouds = data.map(d => d.clouds);

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Wind (km/h)', data: winds, borderColor: '#38bdf8', backgroundColor: 'rgba(56, 189, 248, 0.1)', tension: 0.4, fill: true, yAxisID: 'y' },
                        { label: 'Clouds (%)', data: clouds, borderColor: '#a78bfa', backgroundColor: 'rgba(167, 139, 250, 0.1)', tension: 0.4, fill: true, yAxisID: 'y' },
                        { label: 'CAPE (J/kg)', data: capes, borderColor: '#ef4444', backgroundColor: 'transparent', borderDash: [5, 5], tension: 0.4, yAxisID: 'y1' }
                    ]
                },
                options: {
                    responsive: true,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { labels: { color: '#cbd5e1', font: { family: 'Outfit', size: 10 } } },
                        tooltip: { backgroundColor: 'rgba(15,23,42,0.9)', titleFont: { family: 'Outfit' }, bodyFont: { family: 'Outfit' } }
                    },
                    scales: {
                        x: { display: false },
                        y: { type: 'linear', display: true, position: 'left', grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8', font: { size: 10 } } },
                        y1: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#ef4444', font: { size: 10 } } }
                    }
                }
            });
        }
    </script>
</body>
</html>
